<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Loucid - Ocean Proxy</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <header>
      <h1 class="brand-name">Loucid</h1>
      <p class="tagline">Explore the Web, Unblocked</p>
    </header>
    <section class="search-box">
      <form action="/search" method="GET">
        <input type="text" name="query" class="search-input" placeholder="Search the web...">
        <button type="submit" class="search-btn">Go</button>
      </form>
    </section>
    <div class="waves">
      <div class="wave"></div>
      <div class="wave"></div>
      <div class="wave"></div>
    </div>
  </div>
</body>
</html>
