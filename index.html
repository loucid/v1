<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Loucid Games</title>

  <style>
    /* General styles */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #000;
      color: #ccc;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      overflow: hidden;
      text-align: center;
      position: relative;
    }

    /* Background: Dark space effect */
    .stars {
      position: fixed;
      width: 100%;
      height: 100%;
      top: 0;
      left: 0;
      background: url('https://www.transparenttextures.com/patterns/asfalt-dark.png');
      opacity: 0.2;
    }

    .stars2 {
      position: fixed;
      width: 100%;
      height: 100%;
      top: 0;
      left: 0;
      background: url('https://www.transparenttextures.com/patterns/black-linen.png');
      opacity: 0.1;
    }

    /* Content Wrapper */
    .container {
      background: rgba(15, 15, 15, 0.9);
      padding: 40px;
      border-radius: 10px;
      box-shadow: 0 0 30px rgba(255, 255, 255, 0.1);
      width: 80%;
      max-width: 700px;
    }

    /* Title */
    h1 {
      font-size: 3rem;
      text-transform: uppercase;
      color: #ddd;
      text-shadow: 0 0 10px rgba(255, 255, 255, 0.6);
    }

    p {
      font-size: 1.2rem;
      color: #888;
      margin-top: 10px;
    }

    /* Buttons */
    .categories {
      margin-top: 30px;
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 15px;
    }

    .categories button {
      background: #1e1e1e;
      color: #fff;
      padding: 12px 25px;
      border: 1px solid #444;
      border-radius: 50px;
      cursor: pointer;
      font-size: 1rem;
      font-weight: 600;
      transition: 0.3s ease-in-out;
      box-shadow: 0 0 15px rgba(255, 255, 255, 0.1);
    }

    .categories button:hover {
      background: #333;
      transform: scale(1.1);
      box-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
    }

    .categories button:active {
      transform: scale(0.9);
    }

    /* Footer */
    footer {
      margin-top: 30px;
      font-size: 0.8rem;
      color: #666;
    }
  </style>
</head>

<body>

  <!-- Background Stars -->
  <div class="stars"></div>
  <div class="stars2"></div>

  <!-- Main Content -->
  <div class="container">
    <h1>Loucid Games</h1>
    <p>Explore the darkness of space, and dive into the best games in the galaxy.</p>

    <!-- Game Categories -->
    <div class="categories">
      <button onclick="location.href='games.html?category=FPS'">FPS</button>
      <button onclick="location.href='games.html?category=Arcade'">Arcade</button>
      <button onclick="location.href='games.html?category=Puzzle'">Puzzle</button>
      <button onclick="location.href='games.html?category=Multiplayer'">Multiplayer</button>
    </div>

    <!-- Footer -->
    <footer>
      <p>Made with 🖤 by Loucid | 2025</p>
    </footer>
  </div>

  <script>
    console.log("Welcome to Loucid Games!");
  </script>

</body>

</html>
