<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Loucid Games</title>

  <!-- Internal CSS for modern styling -->
  <style>
    /* General body and layout styles */
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      margin: 0;
      padding: 0;
      background-color: #f4f6f9;
      color: #333;
      line-height: 1.6;
    }

    /* Header styles */
    header {
      background-color: #2980b9;
      color: white;
      text-align: center;
      padding: 60px 20px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
      border-bottom: 4px solid #1a6f8f;
    }

    header h1 {
      margin: 0;
      font-size: 3.5rem;
      letter-spacing: 1.5px;
      font-weight: 700;
    }

    header p {
      font-size: 1.2rem;
      margin-top: 10px;
      font-weight: 400;
    }

    /* Categories button styles */
    .categories {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 30px;
    }

    .categories button {
      background-color: #3498db;
      color: white;
      padding: 15px 40px;
      margin: 10px;
      border: none;
      border-radius: 30px;
      cursor: pointer;
      font-size: 1.1rem;
      font-weight: 600;
      transition: transform 0.3s ease, background-color 0.3s ease;
      box-shadow: 0 5px 10px rgba(0, 0, 0, 0.1);
    }

    .categories button:hover {
      background-color: #2980b9;
      transform: translateY(-5px);
    }

    .categories button:active {
      transform: translateY(1px);
    }

    /* Game list styles */
    .game-list {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 30px;
      padding: 30px;
      margin-top: 20px;
    }

    .game {
      background-color: white;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
      border-radius: 15px;
      overflow: hidden;
      text-align: center;
      transition: transform 0.3s ease;
    }

    .game:hover {
      transform: translateY(-10px);
    }

    .game iframe {
      width: 100%;
      height: 250px;
      border: none;
      border-radius: 15px;
    }

    .game h2 {
      background-color: #3498db;
      color: white;
      padding: 15px 20px;
      margin: 0;
      font-size: 1.5rem;
      border-bottom: 2px solid #2980b9;
    }

    /* Footer styles */
    footer {
      text-align: center;
      padding: 20px;
      background-color: #2C3E50;
      color: white;
      position: fixed;
      bottom: 0;
      width: 100%;
      font-size: 0.9rem;
    }

    /* Responsiveness for smaller screens */
    @media (max-width: 768px) {
      .categories button {
        width: 90%;
        margin: 10px 0;
      }

      .game-list {
        grid-template-columns: 1fr;
      }

      .game {
        width: 100%;
        margin: 10px 0;
      }
    }
  </style>
</head>

<body>

  <!-- Header Section -->
  <header>
    <h1>Welcome to Loucid Games</h1>
    <p>Play over 700+ games right now!</p>
  </header>

  <!-- Categories Section (Buttons for each category) -->
  <section class="categories">
    <button onclick="location.href='games.html?category=FPS'">FPS</button>
    <button onclick="location.href='games.html?category=Arcade'">Arcade</button>
    <button onclick="location.href='games.html?category=Puzzle'">Puzzle</button>
    <button onclick="location.href='games.html?category=Multiplayer'">Multiplayer</button>
  </section>

  <!-- Games List Section -->
  <section class="game-list">
    <div class="game">
      <h2>Krunker.io</h2>
      <iframe src="https://krunker.io" title="Krunker.io"></iframe>
    </div>
    <div class="game">
      <h2>Agar.io</h2>
      <iframe src="https://agar.io" title="Agar.io"></iframe>
    </div>
    <div class="game">
      <h2>Slither.io</h2>
      <iframe src="https://slither.io" title="Slither.io"></iframe>
    </div>
    <div class="game">
      <h2>Diep.io</h2>
      <iframe src="https://diep.io" title="Diep.io"></iframe>
    </div>
  </section>

  <!-- Footer Section -->
  <footer>
    <p>Made with ❤️ by Loucid</p>
  </footer>

  <!-- Optional JavaScript -->
  <script>
    console.log("Welcome to Loucid Games!");
  </script>

</body>

</html>
